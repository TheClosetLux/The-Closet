  <style>
/* =============================================================================
   OBVIOUS DESIGN SYSTEM - CSS TEMPLATE
   Light/Dark mode support with semantic tokens
   ============================================================================= */

/* CSS Reset */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* =============================================================================
   CSS VARIABLES - LIGHT MODE (DEFAULT)
   ============================================================================= */

:root {
  /* Font */
  --font-sans: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  /* Neutral Colors */
  --neutral-100: #ffffff;
  --neutral-200: #fcfcfc;
  --neutral-300: #f5f5f5;
  --neutral-400: #ededed;
  --neutral-500: #e5e5e5;
  --neutral-600: #d6d6d6;
  --neutral-700: #c2c2c2;
  --neutral-800: #a8a8a8;
  --neutral-900: #808080;
  --neutral-1000: #3d3d3d;
  --neutral-1100: #2e2e2e;
  --neutral-1200: #080808;

  /* Darken Overlays (black with opacity) */
  --darken-100: rgba(0, 0, 0, 0.02);
  --darken-200: rgba(0, 0, 0, 0.04);
  --darken-300: rgba(0, 0, 0, 0.06);
  --darken-400: rgba(0, 0, 0, 0.08);
  --darken-500: rgba(0, 0, 0, 0.12);
  --darken-600: rgba(0, 0, 0, 0.16);
  --darken-800: rgba(0, 0, 0, 0.24);
  --darken-900: rgba(0, 0, 0, 0.4);
  --darken-1100: rgba(0, 0, 0, 0.64);
  --darken-1300: rgba(0, 0, 0, 0.8);
  --darken-1400: rgba(0, 0, 0, 0.92);

  /* Accent Colors */
  --blue-50: #fbfdff;
  --blue-100: #f4faff;
  --blue-200: #e6f4fe;
  --blue-300: #d5efff;
  --blue-400: #c2e5ff;
  --blue-500: #acd8fc;
  --blue-600: #8ec8f6;
  --blue-700: #5eb1ef;
  --blue-800: #29a2ff;
  --blue-900: #0588f0;
  --blue-link: #0b61ad;

  --green-100: #f0fdf4;
  --green-500: #4ade80;
  --green-600: #22c55e;
  --green-700: #16a34a;
  --green-800: #15803d;

  --red-100: #fef2f2;
  --red-500: #f87171;
  --red-600: #ef4444;
  --red-700: #dc2626;
  --red-800: #b91c1c;

  --orange-100: #fff7ed;
  --orange-500: #fb923c;
  --orange-600: #f97316;
  --orange-800: #c2410c;

  /* Semantic Tokens */
  --surface-base: var(--neutral-200);
  --surface-primary: var(--neutral-100);
  --surface-secondary: var(--neutral-200);
  --surface-elevated: var(--neutral-100);
  --surface-hover: var(--darken-200);
  --surface-active: var(--darken-300);

  --text-primary: var(--darken-1400);
  --text-secondary: var(--darken-1100);
  --text-tertiary: var(--darken-900);
  --text-muted: var(--darken-800);
  --text-inverse: var(--neutral-100);

  --border-subtle: var(--darken-200);
  --border-default: var(--darken-400);
  --border-strong: var(--darken-600);
  --border-focus: var(--blue-800);

  --button-primary-bg: var(--neutral-1200);
  --button-primary-fg: var(--neutral-100);
  --button-primary-hover: var(--neutral-1000);

  --state-success-bg: var(--green-100);
  --state-success-fg: var(--green-800);
  --state-success-border: var(--green-600);

  --state-error-bg: var(--red-100);
  --state-error-fg: var(--red-800);
  --state-error-border: var(--red-600);

  --state-warning-bg: var(--orange-100);
  --state-warning-fg: var(--orange-800);
  --state-warning-border: var(--orange-600);

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* Border Radius */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 10px;
  --radius-xl: 14px;

  /* Row Heights */
  --row-sm: 28px;
  --row-md: 32px;
  --row-lg: 36px;
  --row-xl: 40px;

  /* Transitions */
  --transition-fast: 100ms ease;
  --transition-normal: 150ms ease;
  --transition-medium: 200ms ease;
  --transition-slow: 300ms ease;

  /* Shadows */
  --shadow-lifted:
    0px 0px 2px 0px rgba(0, 0, 0, 0.05), 0px 0px 1px 0px rgba(0, 0, 0, 0.05), 0px 0px 0px 1px rgba(0, 0, 0, 0.08);
  --shadow-lifted-card:
    0px 1px 2px 0px rgba(0, 0, 0, 0.05), 0px 0px 1px 0px rgba(0, 0, 0, 0.05), 0px 0px 0px 1px rgba(0, 0, 0, 0.08);
  --shadow-tooltip: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

/* =============================================================================
   CSS VARIABLES - DARK MODE
   ============================================================================= */

html.dark,
.dark {
  /* Neutral Colors (inverted) */
  --neutral-100: #1a1a1a;
  --neutral-200: #1f1f1f;
  --neutral-300: #262626;
  --neutral-400: #2e2e2e;
  --neutral-500: #383838;
  --neutral-600: #4a4a4a;
  --neutral-700: #5e5e5e;
  --neutral-800: #7a7a7a;
  --neutral-900: #a3a3a3;
  --neutral-1000: #e0e0e0;
  --neutral-1100: #ebebeb;
  --neutral-1200: #f5f5f5;

  /* Darken becomes Lighten (white with opacity) */
  --darken-100: rgba(255, 255, 255, 0.02);
  --darken-200: rgba(255, 255, 255, 0.04);
  --darken-300: rgba(255, 255, 255, 0.06);
  --darken-400: rgba(255, 255, 255, 0.08);
  --darken-500: rgba(255, 255, 255, 0.12);
  --darken-600: rgba(255, 255, 255, 0.16);
  --darken-800: rgba(255, 255, 255, 0.24);
  --darken-900: rgba(255, 255, 255, 0.4);
  --darken-1100: rgba(255, 255, 255, 0.64);
  --darken-1300: rgba(255, 255, 255, 0.8);
  --darken-1400: rgba(255, 255, 255, 0.92);

  /* Blue (brighter for dark bg) */
  --blue-50: #0a1929;
  --blue-100: #0d2847;
  --blue-200: #0f3a5f;
  --blue-300: #1a4d7a;
  --blue-400: #2563a8;
  --blue-500: #3b82f6;
  --blue-600: #60a5fa;
  --blue-700: #93c5fd;
  --blue-800: #bfdbfe;
  --blue-900: #dbeafe;
  --blue-link: #60a5fa;

  /* Green (brighter for dark bg) */
  --green-100: #052e16;
  --green-500: #34d399;
  --green-600: #22c55e;
  --green-700: #4ade80;
  --green-800: #86efac;

  /* Red (brighter for dark bg) */
  --red-100: #450a0a;
  --red-500: #f87171;
  --red-600: #ef4444;
  --red-700: #fca5a5;
  --red-800: #fecaca;

  /* Orange (brighter for dark bg) */
  --orange-100: #431407;
  --orange-500: #fb923c;
  --orange-600: #f97316;
  --orange-800: #fdba74;

  /* Semantic Tokens (auto-adapt via base tokens) */
  --button-primary-bg: var(--neutral-500);
  --button-primary-fg: var(--neutral-1200);
  --button-primary-hover: var(--neutral-600);

  /* Shadows (inverted) */
  --shadow-lifted:
    0px 0px 2px 0px rgba(255, 255, 255, 0.05), 0px 0px 1px 0px rgba(255, 255, 255, 0.05),
    0px 0px 0px 1px rgba(255, 255, 255, 0.08);
  --shadow-lifted-card:
    0px 1px 2px 0px rgba(255, 255, 255, 0.05), 0px 0px 1px 0px rgba(255, 255, 255, 0.05),
    0px 0px 0px 1px rgba(255, 255, 255, 0.08);
  --shadow-tooltip: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
}

/* =============================================================================
   BASE STYLES
   ============================================================================= */

html {
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color-scheme: light;
}

html.dark {
  color-scheme: dark;
}

body {
  background-color: var(--surface-base);
  color: var(--text-primary);
  min-height: 100vh;
  transition:
    background-color var(--transition-normal),
    color var(--transition-normal);
}

/* =============================================================================
   TYPOGRAPHY
   ============================================================================= */

h1,
h2,
h3,
h4,
h5,
h6 {
  font-weight: 520;
  line-height: 1.2;
  color: var(--text-primary);
}

h1 {
  font-size: 40px;
  font-weight: 580;
  letter-spacing: -0.02em;
}
h2 {
  font-size: 32px;
  letter-spacing: -0.01em;
}
h3 {
  font-size: 24px;
}
h4 {
  font-size: 20px;
}
h5 {
  font-size: 18px;
}
h6 {
  font-size: 16px;
}

p {
  color: var(--text-secondary);
  line-height: 1.6;
}

a {
  color: var(--blue-link);
  text-decoration: none;
  transition: color var(--transition-fast);
}

a:hover {
  color: var(--blue-900);
}

small,
.text-sm {
  font-size: 14px;
}

.text-xs {
  font-size: 12px;
}

.text-muted {
  color: var(--text-tertiary);
}

/* =============================================================================
   BUTTONS
   ============================================================================= */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  height: var(--row-md);
  padding: 0 var(--space-4);
  font-size: 14px;
  font-weight: 500;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn-primary {
  background-color: var(--button-primary-bg);
  color: var(--button-primary-fg);
}

.btn-primary:hover {
  background-color: var(--button-primary-hover);
}

.btn-secondary {
  background-color: var(--darken-200);
  color: var(--text-secondary);
}

.btn-secondary:hover {
  background-color: var(--darken-300);
}

.btn-ghost {
  background-color: transparent;
  color: var(--text-secondary);
}

.btn-ghost:hover {
  background-color: var(--surface-hover);
}

.btn-sm {
  height: var(--row-sm);
  padding: 0 var(--space-3);
  font-size: 13px;
}

.btn-lg {
  height: var(--row-lg);
  padding: 0 var(--space-5);
  font-size: 15px;
}

/* =============================================================================
   INPUTS
   ============================================================================= */

.input {
  height: var(--row-md);
  padding: 0 var(--space-3);
  font-size: 14px;
  background-color: var(--surface-primary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  transition: border-color var(--transition-fast);
}

.input::placeholder {
  color: var(--text-tertiary);
}

.input:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 2px rgba(5, 136, 240, 0.16);
}

.input-lg {
  height: var(--row-lg);
}

textarea.input {
  height: auto;
  min-height: 120px;
  padding: var(--space-3);
  resize: vertical;
}

/* =============================================================================
   CARDS
   ============================================================================= */

.card {
  background-color: var(--surface-primary);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lifted-card);
  padding: var(--space-5);
}

.card-hover {
  transition:
    box-shadow var(--transition-normal),
    transform var(--transition-normal);
}

.card-hover:hover {
  transform: translateY(-2px);
  box-shadow:
    0px 4px 8px 0px rgba(0, 0, 0, 0.08),
    0px 0px 1px 0px rgba(0, 0, 0, 0.05),
    0px 0px 0px 1px rgba(0, 0, 0, 0.08);
}

.dark .card-hover:hover {
  box-shadow:
    0px 4px 8px 0px rgba(0, 0, 0, 0.3),
    0px 0px 1px 0px rgba(255, 255, 255, 0.05),
    0px 0px 0px 1px rgba(255, 255, 255, 0.08);
}

/* =============================================================================
   BADGES & PILLS
   ============================================================================= */

.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 2px var(--space-2);
  font-size: 12px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  background-color: var(--darken-200);
  color: var(--text-secondary);
}

.badge-success {
  background-color: var(--state-success-bg);
  color: var(--state-success-fg);
}

.badge-error {
  background-color: var(--state-error-bg);
  color: var(--state-error-fg);
}

.badge-warning {
  background-color: var(--state-warning-bg);
  color: var(--state-warning-fg);
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-3);
  font-size: 12px;
  font-weight: 500;
  border-radius: 9999px;
  background-color: var(--darken-200);
  color: var(--text-secondary);
}

/* =============================================================================
   ALERTS
   ============================================================================= */

.alert {
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  font-size: 14px;
}

.alert-success {
  background-color: var(--state-success-bg);
  color: var(--state-success-fg);
  border: 1px solid var(--state-success-border);
}

.alert-error {
  background-color: var(--state-error-bg);
  color: var(--state-error-fg);
  border: 1px solid var(--state-error-border);
}

.alert-warning {
  background-color: var(--state-warning-bg);
  color: var(--state-warning-fg);
  border: 1px solid var(--state-warning-border);
}

/* =============================================================================
   LAYOUT UTILITIES
   ============================================================================= */

.container {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 var(--space-4);
}

.container-sm {
  max-width: 640px;
}
.container-md {
  max-width: 768px;
}
.container-lg {
  max-width: 1024px;
}
.container-xl {
  max-width: 1280px;
}

.flex {
  display: flex;
}
.flex-col {
  flex-direction: column;
}
.items-center {
  align-items: center;
}
.justify-center {
  justify-content: center;
}
.justify-between {
  justify-content: space-between;
}
.gap-1 {
  gap: var(--space-1);
}
.gap-2 {
  gap: var(--space-2);
}
.gap-3 {
  gap: var(--space-3);
}
.gap-4 {
  gap: var(--space-4);
}
.gap-6 {
  gap: var(--space-6);
}
.gap-8 {
  gap: var(--space-8);
}

/* =============================================================================
   LIFTED BORDERS
   ============================================================================= */

.lifted-border {
  box-shadow: var(--shadow-lifted);
}

.lifted-border-shadow {
  box-shadow: var(--shadow-lifted-card);
}

/* =============================================================================
   FOCUS RING
   ============================================================================= */

.focus-ring:focus-visible {
  outline: none;
  box-shadow:
    0px 0px 0px 1px var(--blue-800),
    0px 0px 0px 3px rgba(5, 136, 240, 0.16);
}

/* =============================================================================
   SCROLLBAR STYLING
   ============================================================================= */

.scrollbar-hide {
  scrollbar-width: none;
}

.scrollbar-hide::-webkit-scrollbar {
  display: none;
}

/* =============================================================================
   THEME TOGGLE BUTTON
   ============================================================================= */

.theme-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: var(--row-md);
  height: var(--row-md);
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--text-secondary);
  transition:
    background-color var(--transition-fast),
    color var(--transition-fast);
}

.theme-toggle:hover {
  background-color: var(--surface-hover);
  color: var(--text-primary);
}

.theme-toggle svg {
  width: 20px;
  height: 20px;
}

/* Hide icons based on theme */
html:not(.dark) .theme-toggle .icon-moon {
  display: none;
}
html.dark .theme-toggle .icon-sun {
  display: none;
}

</style>
  <style>
    /* ── Brand overrides: Black & Gold luxe ── */
    :root, html.dark {
      --brand-gold: #c9a84c;
      --brand-gold-light: #e8c97a;
      --brand-gold-dim: rgba(201, 168, 76, 0.18);
      --brand-black: #0a0a0a;
      --brand-surface: #111111;
      --brand-card: #181818;
      --brand-card-hover: #1e1e1e;
      --brand-text: #f0ead6;
      --brand-text-muted: #8a7d6a;

      /* Override surface tokens for full dark/gold theme */
      --surface-base: var(--brand-black);
      --surface-primary: var(--brand-surface);
      --surface-secondary: var(--brand-card);
      --surface-elevated: var(--brand-card-hover);
      --text-primary: var(--brand-text);
      --text-secondary: #c8bca8;
      --text-muted: var(--brand-text-muted);
    }

    body {
      background: var(--brand-black);
      color: var(--brand-text);
      font-family: var(--font-sans);
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      text-align: center;
      padding: var(--space-12) var(--space-6) var(--space-8);
      position: relative;
    }

    .site-header::after {
      content: '';
      display: block;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--brand-gold), transparent);
      margin: var(--space-6) auto 0;
    }

    .logo-crown {
      font-size: 28px;
      margin-bottom: var(--space-3);
      display: block;
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 700;
      color: var(--brand-gold);
      letter-spacing: 0.02em;
      line-height: 1.15;
      margin-bottom: var(--space-2);
    }

    .site-subtitle {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--brand-text-muted);
    }

    /* ── Nav tabs ── */
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-6);
      flex-wrap: wrap;
    }

    .nav-tab {
      padding: 8px 22px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--brand-text-muted);
      transition: all var(--transition-normal);
      position: relative;
    }

    .nav-tab.active,
    .nav-tab:hover {
      color: var(--brand-gold);
      background: var(--brand-gold-dim);
    }

    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 2px;
      background: var(--brand-gold);
      border-radius: 2px;
    }

    /* ── Main container ── */
    .page-container {
      max-width: 480px;
      margin: 0 auto;
      padding: var(--space-4) var(--space-5) var(--space-12);
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--brand-gold);
      margin-bottom: var(--space-4);
      padding-left: var(--space-1);
    }

    /* ── Video section ── */
    .video-section {
      margin-bottom: var(--space-8);
    }

    .video-card {
      background: var(--brand-card);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(201,168,76,0.15), 0 4px 24px rgba(0,0,0,0.5);
      margin-bottom: var(--space-4);
      transition: transform var(--transition-medium), box-shadow var(--transition-medium);
    }

    .video-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(201,168,76,0.35), 0 8px 32px rgba(0,0,0,0.6);
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .video-info {
      padding: var(--space-4) var(--space-5);
    }

    .video-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--brand-text);
      margin-bottom: var(--space-1);
    }

    .video-desc {
      font-size: 12px;
      color: var(--brand-text-muted);
      line-height: 1.5;
    }

    /* ── Product grid ── */
    .products-section {
      margin-bottom: var(--space-8);
    }

    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .product-card {
      background: var(--brand-card);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(201,168,76,0.12), 0 2px 12px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform var(--transition-medium), box-shadow var(--transition-medium);
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 0 1px rgba(201,168,76,0.4), 0 8px 28px rgba(0,0,0,0.55);
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--brand-card-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-info {
      padding: var(--space-3) var(--space-3) var(--space-4);
    }

    .product-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--brand-text);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .product-price {
      font-size: 12px;
      color: var(--brand-gold);
      font-weight: 500;
      margin-bottom: var(--space-2);
    }

    .product-btn {
      display: block;
      width: 100%;
      padding: 7px 0;
      background: var(--brand-gold-dim);
      color: var(--brand-gold);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: var(--radius-md);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      transition: all var(--transition-fast);
      text-decoration: none;
    }

    .product-btn:hover {
      background: var(--brand-gold);
      color: #000;
      border-color: var(--brand-gold);
    }

    /* ── Add item panel ── */
    .add-panel {
      background: var(--brand-card);
      border-radius: var(--radius-xl);
      box-shadow: 0 0 0 1px rgba(201,168,76,0.15);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
    }

    .add-panel h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--brand-gold);
      margin-bottom: var(--space-5);
    }

    .form-group {
      margin-bottom: var(--space-4);
    }

    .form-label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--brand-text-muted);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: 10px var(--space-4);
      background: var(--brand-black);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius-md);
      color: var(--brand-text);
      font-size: 14px;
      font-family: var(--font-sans);
      transition: border-color var(--transition-fast);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--brand-gold);
    }

    .form-input::placeholder {
      color: var(--brand-text-muted);
      opacity: 0.6;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .add-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--brand-gold), #a07830);
      color: #000;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity var(--transition-fast);
      margin-top: var(--space-2);
    }

    .add-btn:hover { opacity: 0.88; }

    .type-toggle {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .type-btn {
      flex: 1;
      padding: 9px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(201,168,76,0.2);
      background: transparent;
      color: var(--brand-text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .type-btn.active {
      background: var(--brand-gold-dim);
      border-color: var(--brand-gold);
      color: var(--brand-gold);
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    /* ── Footer ── */
    .site-footer {
      text-align: center;
      padding: var(--space-8) var(--space-6);
      font-size: 11px;
      color: var(--brand-text-muted);
      letter-spacing: 0.1em;
    }

    .site-footer span {
      color: var(--brand-gold);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: var(--space-10) var(--space-6);
      color: var(--brand-text-muted);
    }

    .empty-state .icon { font-size: 32px; margin-bottom: var(--space-3); }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--brand-gold);
      color: #000;
      padding: 10px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.3s ease;
      z-index: 1000;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Tab content ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Responsive ── */
    @media (max-width: 380px) {
      .products-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <span class="logo-crown">♛</span>
    <h1 class="site-title">The Closet</h1>
    <p class="site-subtitle">Where Busy Women Shop</p>
  </header>

  <!-- Nav -->
  <nav class="nav-tabs" role="tablist">
    <button class="nav-tab active" data-tab="shop" onclick="switchTab('shop', this)">Shop</button>
    <button class="nav-tab" data-tab="videos" onclick="switchTab('videos', this)">Videos</button>
    <button class="nav-tab" data-tab="manage" onclick="switchTab('manage', this)">✦ Add Items</button>
  </nav>

  <div class="page-container">

    <!-- ── SHOP TAB ── -->
    <div id="tab-shop" class="tab-content active">
      <p class="section-label">My Picks</p>
      <div class="products-grid" id="products-grid">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ── VIDEOS TAB ── -->
    <div id="tab-videos" class="tab-content">
      <p class="section-label">Watch & Shop</p>
      <div id="videos-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ── MANAGE TAB ── -->
    <div id="tab-manage" class="tab-content">
      <div class="add-panel">
        <h3>Add New Item</h3>

        <!-- Type toggle -->
        <div class="type-toggle">
          <button class="type-btn active" onclick="switchType('product', this)">🛍 Product</button>
          <button class="type-btn" onclick="switchType('video', this)">▶ Video</button>
        </div>

        <!-- Product form -->
        <div id="form-product" class="form-section active">
          <div class="form-group">
            <label class="form-label">Product Name</label>
            <input class="form-input" id="p-name" type="text" placeholder="e.g. Silk Slip Dress" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Price</label>
              <input class="form-input" id="p-price" type="text" placeholder="$49.99" />
            </div>
            <div class="form-group">
              <label class="form-label">Emoji / Icon</label>
              <input class="form-input" id="p-emoji" type="text" placeholder="👗" maxlength="4" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Amazon Affiliate Link</label>
            <input class="form-input" id="p-link" type="url" placeholder="https://amzn.to/..." />
          </div>
          <div class="form-group">
            <label class="form-label">Image URL (optional)</label>
            <input class="form-input" id="p-img" type="url" placeholder="https://..." />
          </div>
          <button class="add-btn" onclick="addProduct()">Add Product</button>
        </div>

        <!-- Video form -->
        <div id="form-video" class="form-section">
          <div class="form-group">
            <label class="form-label">Video Title</label>
            <input class="form-input" id="v-title" type="text" placeholder="e.g. My Winter Wardrobe Haul" />
          </div>
          <div class="form-group">
            <label class="form-label">YouTube URL or Video ID</label>
            <input class="form-input" id="v-url" type="text" placeholder="https://youtube.com/watch?v=... or dQw4w9WgXcQ" />
          </div>
          <div class="form-group">
            <label class="form-label">Short Description (optional)</label>
            <input class="form-input" id="v-desc" type="text" placeholder="My top picks this season..." />
          </div>
          <button class="add-btn" onclick="addVideo()">Add Video</button>
        </div>
      </div>

      <!-- Manage existing -->
      <p class="section-label">Manage Items</p>
      <div id="manage-list"></div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="site-footer">
    Curated with <span>♥</span> by Tessy · Powered by Amazon Associates
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
// =============================================================================
// THEME TOGGLE
// Supports: system preference, manual toggle, localStorage persistence
// =============================================================================

;(() => {
  const STORAGE_KEY = 'obvious-theme'

  // Get stored preference or system preference
  function getPreferredTheme() {
    const stored = localStorage.getItem(STORAGE_KEY)
    if (stored) return stored

    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
  }

  // Apply theme to document
  function setTheme(theme) {
    const root = document.documentElement

    if (theme === 'dark') {
      root.classList.add('dark')
      root.classList.remove('light')
    } else {
      root.classList.add('light')
      root.classList.remove('dark')
    }

    localStorage.setItem(STORAGE_KEY, theme)
  }

  // Toggle between light and dark
  function toggleTheme() {
    const current = document.documentElement.classList.contains('dark') ? 'dark' : 'light'
    const next = current === 'dark' ? 'light' : 'dark'
    setTheme(next)
  }

  // Initialize on load
  setTheme(getPreferredTheme())

  // Listen for system preference changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
    // Only auto-switch if user hasn't manually set a preference
    if (!localStorage.getItem(STORAGE_KEY)) {
      setTheme(e.matches ? 'dark' : 'light')
    }
  })

  // Expose toggle function globally
  window.toggleTheme = toggleTheme

  // Auto-bind to .theme-toggle buttons
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.theme-toggle').forEach((btn) => {
      btn.addEventListener('click', toggleTheme)
    })
  })
})()

</script>
  <script>
    // ── State ──
    const STORAGE_KEY = 'closet_data';

    function loadData() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { products: [], videos: [] };
      } catch { return { products: [], videos: [] }; }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ── Seed data (shown on first load) ──
    function initSeedData() {
      const data = loadData();
      if (data.products.length === 0 && data.videos.length === 0) {
        data.products = [
          { id: 1, name: "Hydrogen Water Bottle Generator", price: "CHF 46.04", emoji: "💧", link: "https://amzn.to/4c8sZNt", img: "" },
          { id: 2, name: "Telomere Maintenance Formula Dr. Michalzik", price: "CHF 66.28 (10% off)", emoji: "🧠", link: "https://amzn.to/4vuuVaw", img: "" },
          { id: 3, name: "Collagen Night Wrap Mask", price: "CHF 8.36", emoji: "🫧", link: "https://amzn.to/4mq4vTc", img: "" },
          { id: 4, name: "d'alba White Truffle First Spray Serum", price: "CHF 18.41", emoji: "🧴", link: "https://amzn.to/3QBjLki", img: "" },
          { id: 5, name: "K18 Leave-In Repair Hair Mask", price: "CHF 26.71", emoji: "💆‍♀️", link: "https://amzn.to/4tbwkl2", img: "" },
        ];
        data.videos = [
          { id: 1, title: "My Autumn Wardrobe Essentials", youtubeId: "dQw4w9WgXcQ", desc: "Everything I'm wearing this season — all linked below!" },
        ];
        saveData(data);
      }
    }

    // ── Tab switching ──
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');
      if (tab === 'manage') renderManageList();
    }

    // ── Type switching (product/video) ──
    function switchType(type, btn) {
      document.querySelectorAll('.type-btn').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('form-' + type).classList.add('active');
    }

    // ── Render products ──
    function renderProducts() {
      const data = loadData();
      const grid = document.getElementById('products-grid');
      if (data.products.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="icon">🛍</div>
          <p>No products yet.<br>Head to <strong style="color:var(--brand-gold)">Add Items</strong> to get started.</p>
        </div>`;
        return;
      }
      grid.innerHTML = data.products.map(p => `
        <a class="product-card" href="${p.link || '#'}" target="_blank" rel="noopener">
          <div class="product-img">
            ${p.img ? `<img src="${p.img}" alt="${p.name}" onerror="this.parentElement.innerHTML='${p.emoji || '🛍'}'">` : (p.emoji || '🛍')}
          </div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-price">${p.price}</div>
            <span class="product-btn">Shop on Amazon</span>
          </div>
        </a>
      `).join('');
    }

    // ── Render videos ──
    function renderVideos() {
      const data = loadData();
      const list = document.getElementById('videos-list');
      if (data.videos.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="icon">▶</div>
          <p>No videos yet.<br>Head to <strong style="color:var(--brand-gold)">Add Items</strong> to add a YouTube video.</p>
        </div>`;
        return;
      }
      list.innerHTML = data.videos.map(v => `
        <div class="video-card">
          <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/${v.youtubeId}?rel=0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen loading="lazy"></iframe>
          </div>
          <div class="video-info">
            <div class="video-title">${v.title}</div>
            ${v.desc ? `<div class="video-desc">${v.desc}</div>` : ''}
          </div>
        </div>
      `).join('');
    }

    // ── Render manage list ──
    function renderManageList() {
      const data = loadData();
      const list = document.getElementById('manage-list');
      const allItems = [
        ...data.products.map(p => ({ ...p, type: 'product' })),
        ...data.videos.map(v => ({ ...v, type: 'video' }))
      ];
      if (allItems.length === 0) {
        list.innerHTML = `<div class="empty-state"><p>Nothing added yet.</p></div>`;
        return;
      }
      list.innerHTML = allItems.map(item => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--brand-card);border-radius:var(--radius-lg);margin-bottom:8px;box-shadow:0 0 0 1px rgba(201,168,76,0.1);">
          <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:20px;">${item.type === 'product' ? (item.emoji || '🛍') : '▶'}</span>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--brand-text)">${item.type === 'product' ? item.name : item.title}</div>
              <div style="font-size:11px;color:var(--brand-text-muted);text-transform:uppercase;letter-spacing:0.1em">${item.type}</div>
            </div>
          </div>
          <button onclick="deleteItem('${item.type}', ${item.id})" style="background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.25);color:#ff6060;border-radius:var(--radius-sm);padding:5px 12px;font-size:11px;cursor:pointer;">Remove</button>
        </div>
      `).join('');
    }

    // ── Add product ──
    function addProduct() {
      const name = document.getElementById('p-name').value.trim();
      const price = document.getElementById('p-price').value.trim();
      const emoji = document.getElementById('p-emoji').value.trim();
      const link = document.getElementById('p-link').value.trim();
      const img = document.getElementById('p-img').value.trim();
      if (!name) { showToast('Please enter a product name'); return; }
      const data = loadData();
      const id = Date.now();
      data.products.push({ id, name, price, emoji: emoji || '🛍', link, img });
      saveData(data);
      renderProducts();
      // Clear
      ['p-name','p-price','p-emoji','p-link','p-img'].forEach(id => document.getElementById(id).value = '');
      showToast('✓ Product added!');
    }

    // ── Add video ──
    function addVideo() {
      const title = document.getElementById('v-title').value.trim();
      const urlRaw = document.getElementById('v-url').value.trim();
      const desc = document.getElementById('v-desc').value.trim();
      if (!title || !urlRaw) { showToast('Please enter a title and YouTube URL'); return; }
      const youtubeId = extractYouTubeId(urlRaw);
      if (!youtubeId) { showToast('Could not parse YouTube URL'); return; }
      const data = loadData();
      data.videos.push({ id: Date.now(), title, youtubeId, desc });
      saveData(data);
      renderVideos();
      ['v-title','v-url','v-desc'].forEach(id => document.getElementById(id).value = '');
      showToast('✓ Video added!');
    }

    // ── Delete item ──
    function deleteItem(type, id) {
      const data = loadData();
      if (type === 'product') data.products = data.products.filter(p => p.id !== id);
      else data.videos = data.videos.filter(v => v.id !== id);
      saveData(data);
      renderManageList();
      renderProducts();
      renderVideos();
      showToast('Removed');
    }

    // ── Extract YouTube ID ──
    function extractYouTubeId(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/,
        /^([A-Za-z0-9_-]{11})$/
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    // ── Toast ──
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── Init ──
    initSeedData();
    renderProducts();
    renderVideos();
  </script>
</body>
